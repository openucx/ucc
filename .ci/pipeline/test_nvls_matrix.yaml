---
job: "ucc-test-nvls"

step_allow_single_selector: true

registry_host: "harbor.mellanox.com"
registry_path: "/torch-ucc"
registry_auth: "ucc-harbor-credentials"

kubernetes:
  cloud: il-ipp-blossom-prod
  namespace: hpcx
  limits: "{memory: 16Gi, cpu: 16000m}"
  requests: "{memory: 8Gi, cpu: 8000m}"

pvc_volumes:
  - {claimName: hpcx-pvc, mountPath: /mnt/pvc, readOnly: false}

empty_volumes:
  - {mountPath: /root, memory: false}

env:
  CUDA_VER: 13.1.1
  UCC_URI_SUFFIX: "ucc/${UCC_VERSION}/aarch64/ubuntu24.04/cuda${CUDA_VER}"
  DOCKER_IMAGE_TAG: "${BUILD_NUMBER}"
  SLURM_NODES: 2
  SLURM_PARTITION: 'gb300nvl72_ci'
  SLURM_HEAD_NODE: 'dlcluster.nvidia.com'
  SLURM_ACCOUNT: 'blackwell-ci'
  SLURM_JOB_TIMEOUT: '01:30:00'
  SLURM_JOB_NAME: "${BUILD_TAG}"
  SLURM_CONTAINER_NAME: "${BUILD_TAG}"
  SLURM_HEAD_NODE_USER: 'svcnbu-swx-hpcx'
  SLURM_IMMEDIATE_TIMEOUT: 3600 # 1 hour
  JOB_ID_FILE: "/mnt/pvc/job-id-${BUILD_TAG}.txt"
  SLURM_CREDENTIALS_ID: 'svcnbu-swx-hpcx_id_rsa_ssh_key'
  TEST_TIMEOUT_MINUTES: 35
  NVLS_MPI_PPN: 4

# cloud pod to build the shared docker image
runs_on_dockers:
  - {
      file: ".ci/Dockerfile.nvls",
      name: "nvls",
      tag: "${DOCKER_IMAGE_TAG}",
      arch: "aarch64",
      uri: "${UCC_URI_SUFFIX}",
      build_args: "--no-cache --build-arg CUDA_VER=${CUDA_VER} --build-arg _UID=149917 --build-arg _GID=30 --build-arg _LOGIN=svcnbu-swx-hpcx --build-arg _GROUP=svcnbu-swx-hpcx",
    }
  - {
      file: ".ci/dockerfiles/Dockerfile.build_helper",
      name: "build_helper",
      tag: "nvls",
      arch: "x86_64",
      uri: "$arch/$name",
      build_args: "--no-cache",
    }

# overall job timeout should be > 1h slurm allocation + 3 * 35m test timeout + buffer for setup/teardown
timeout_minutes: 240

steps:
  - name: Allocate Slurm job
    containerSelector: "{name: 'build_helper'}"
    parallel: false
    shell: action
    module: slurmCI
    run: allocation
    args:
      partition: "${SLURM_PARTITION}"
      headNode: "${SLURM_HEAD_NODE}"
      headUser: "${SLURM_HEAD_NODE_USER}"
      nodes: "${SLURM_NODES}"
      jobTimeout: "${SLURM_JOB_TIMEOUT}"
      immediateTimeout: "${SLURM_IMMEDIATE_TIMEOUT}"
      jobName: "${SLURM_JOB_NAME}"
      jobIdFile: "${JOB_ID_FILE}"
      credentialsId: "${SLURM_CREDENTIALS_ID}"
      extraArgs: [
        "--account=${SLURM_ACCOUNT}",
      ]

  - name: Read Slurm job ID
    containerSelector: "{name: 'build_helper'}"
    parallel: false
    shell: action
    module: groovy
    run: env.SLURM_JOB_ID = readFile(JOB_ID_FILE).trim()

  - name: Run UCC NVLS perftest
    containerSelector: "{name: 'build_helper'}"
    timeout: "${TEST_TIMEOUT_MINUTES}"
    shell: action
    module: slurmCI
    run: run
    args:
      jobId: "${SLURM_JOB_ID}"
      testScript: "/opt/nvidia/src/ucc/.ci/scripts/run_tests_ucc_nvls_all.sh"
      headNode: "${SLURM_HEAD_NODE}"
      headUser: "${SLURM_HEAD_NODE_USER}"
      dockerImage: "${registry_host}#torch-ucc/${UCC_URI_SUFFIX}:${DOCKER_IMAGE_TAG}"
      credentialsId: "${SLURM_CREDENTIALS_ID}"
      containerName: "${SLURM_CONTAINER_NAME}"
      extraArgs: [
        "--ntasks-per-node=${NVLS_MPI_PPN}",
      ]

  - name: Run UCC NVLS MPI tests (allreduce)
    containerSelector: "{name: 'build_helper'}"
    timeout: "${TEST_TIMEOUT_MINUTES}"
    shell: action
    module: slurmCI
    run: run
    args:
      jobId: "${SLURM_JOB_ID}"
      testScript: "/opt/nvidia/src/ucc/.ci/scripts/run_tests_ucc_nvls_mpi.sh"
      headNode: "${SLURM_HEAD_NODE}"
      headUser: "${SLURM_HEAD_NODE_USER}"
      dockerImage: "${registry_host}#torch-ucc/${UCC_URI_SUFFIX}:${DOCKER_IMAGE_TAG}"
      credentialsId: "${SLURM_CREDENTIALS_ID}"
      containerName: "${SLURM_CONTAINER_NAME}"
      extraArgs: [
        "--ntasks-per-node=${NVLS_MPI_PPN}",
      ]

  - name: Run UCC NVLS MPI tests (reduce_scatter)
    containerSelector: "{name: 'build_helper'}"
    timeout: "${TEST_TIMEOUT_MINUTES}"
    shell: action
    module: slurmCI
    run: run
    args:
      jobId: "${SLURM_JOB_ID}"
      testScript: "/opt/nvidia/src/ucc/.ci/scripts/run_tests_ucc_nvls_mpi_reduce_scatter.sh"
      headNode: "${SLURM_HEAD_NODE}"
      headUser: "${SLURM_HEAD_NODE_USER}"
      dockerImage: "${registry_host}#torch-ucc/${UCC_URI_SUFFIX}:${DOCKER_IMAGE_TAG}"
      credentialsId: "${SLURM_CREDENTIALS_ID}"
      containerName: "${SLURM_CONTAINER_NAME}"
      extraArgs: [
        "--ntasks-per-node=${NVLS_MPI_PPN}",
      ]

pipeline_stop:
  containerSelector: "{name: 'build_helper'}"
  shell: action
  module: slurmCI
  run: stop
  args:
    headUser: "${SLURM_HEAD_NODE_USER}"
    credentialsId: "${SLURM_CREDENTIALS_ID}"
    headNode: "${SLURM_HEAD_NODE}"
    jobId: "${SLURM_JOB_ID}"
